<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment Dashboard — UI Conformity Study</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f0f2f5;
            --muted: #9ca3af;
            --accent: #6366f1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            transition: 0.3s;
        }

        .upload-area:hover {
            border-color: var(--accent);
        }

        .upload-area input {
            display: none;
        }

        .upload-area label {
            cursor: pointer;
            color: var(--accent);
            font-weight: 600;
            font-size: 1rem;
        }

        .upload-area p {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            text-align: center;
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 0.25rem;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .chart-card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .chart-card.wide {
            grid-column: 1 / -1;
        }

        canvas {
            width: 100% !important;
        }

        .hidden {
            display: none;
        }

        #dashboard {
            display: none;
        }
    </style>
</head>

<body>
    <h1>📊 Experiment Dashboard</h1>
    <p class="subtitle">UI Conformity Study — Real-time Results Viewer</p>

    <div class="upload-area" id="upload-area">
        <label for="csv-input">📁 Click to load CSV data</label>
        <input type="file" id="csv-input" accept=".csv">
        <p>Or drag & drop your experiment CSV file here</p>
    </div>

    <div id="dashboard">
        <div class="stats-row" id="stats-row"></div>
        <div class="charts-grid">
            <div class="chart-card">
                <h3>AI-Preferred Choice Rate by Condition</h3>
                <canvas id="chart-choice"></canvas>
            </div>
            <div class="chart-card">
                <h3>Mean Confidence Rating by Condition</h3>
                <canvas id="chart-confidence"></canvas>
            </div>
            <div class="chart-card wide">
                <h3>Reaction Time Distribution</h3>
                <canvas id="chart-rt"></canvas>
            </div>
        </div>
    </div>

    <script>
        const AI_PREFERRED = {
            pair01: 'A', pair02: 'B', pair03: 'A', pair04: 'B',
            pair05: 'A', pair06: 'B', pair07: 'A', pair08: 'B',
        };

        Chart.defaults.color = '#9ca3af';
        Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';

        document.getElementById('csv-input').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = evt => processCSV(evt.target.result);
            reader.readAsText(file);
        });

        // Drag and drop
        const dropArea = document.getElementById('upload-area');
        ['dragenter', 'dragover'].forEach(e => dropArea.addEventListener(e, ev => { ev.preventDefault(); dropArea.style.borderColor = '#6366f1'; }));
        ['dragleave', 'drop'].forEach(e => dropArea.addEventListener(e, ev => { ev.preventDefault(); dropArea.style.borderColor = ''; }));
        dropArea.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (file) { const reader = new FileReader(); reader.onload = evt => processCSV(evt.target.result); reader.readAsText(file); }
        });

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const vals = line.split(',');
                const obj = {};
                headers.forEach((h, i) => obj[h] = vals[i]?.trim());
                return obj;
            });
        }

        function processCSV(text) {
            const data = parseCSV(text);
            const control = data.filter(r => r.condition === 'control');
            const ai = data.filter(r => r.condition === 'ai');

            const ctrlPids = new Set(control.map(r => r.participant_id)).size;
            const aiPids = new Set(ai.map(r => r.participant_id)).size;

            const ctrlAiChosen = control.filter(r => r.choice === AI_PREFERRED[r.pair_id]).length;
            const aiAiChosen = ai.filter(r => r.choice === AI_PREFERRED[r.pair_id]).length;
            const pCtrl = ctrlAiChosen / control.length;
            const pAi = aiAiChosen / ai.length;

            const ctrlConf = control.map(r => +r.confidence_1_5);
            const aiConf = ai.map(r => +r.confidence_1_5);
            const meanCtrlConf = ctrlConf.reduce((a, b) => a + b, 0) / ctrlConf.length;
            const meanAiConf = aiConf.reduce((a, b) => a + b, 0) / aiConf.length;

            const ctrlRT = control.map(r => +r.rt_ms);
            const aiRT = ai.map(r => +r.rt_ms);
            const meanCtrlRT = ctrlRT.reduce((a, b) => a + b, 0) / ctrlRT.length;
            const meanAiRT = aiRT.reduce((a, b) => a + b, 0) / aiRT.length;

            // Stats cards
            document.getElementById('stats-row').innerHTML = [
                { val: ctrlPids + aiPids, label: 'Total Participants' },
                { val: `${(pCtrl * 100).toFixed(1)}%`, label: 'Control: AI-Pref Rate' },
                { val: `${(pAi * 100).toFixed(1)}%`, label: 'AI Label: AI-Pref Rate' },
                { val: `+${((pAi - pCtrl) * 100).toFixed(1)}pp`, label: 'Effect (AI − Control)' },
            ].map(s => `<div class="stat-card"><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('');

            // Show dashboard
            document.getElementById('upload-area').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // Chart 1: Choice rate
            new Chart(document.getElementById('chart-choice'), {
                type: 'bar',
                data: {
                    labels: ['Control', 'AI Label'],
                    datasets: [{
                        label: '% Choosing AI-Preferred', data: [pCtrl * 100, pAi * 100],
                        backgroundColor: ['#6366f1', '#a78bfa'], borderRadius: 8, barPercentage: 0.5
                    }]
                },
                options: {
                    responsive: true, plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } }
                }
            });

            // Chart 2: Confidence
            new Chart(document.getElementById('chart-confidence'), {
                type: 'bar',
                data: {
                    labels: ['Control', 'AI Label'],
                    datasets: [{
                        label: 'Mean Confidence (1-5)', data: [meanCtrlConf, meanAiConf],
                        backgroundColor: ['#22c55e', '#10b981'], borderRadius: 8, barPercentage: 0.5
                    }]
                },
                options: {
                    responsive: true, plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, max: 5, ticks: { stepSize: 1 } } }
                }
            });

            // Chart 3: RT histogram
            function rtBuckets(rtArr) {
                const bins = Array(10).fill(0);
                const maxRT = 5000;
                rtArr.forEach(rt => { const idx = Math.min(9, Math.floor(rt / (maxRT / 10))); bins[idx]++; });
                return bins;
            }
            const labels = Array(10).fill(0).map((_, i) => `${i * 500}-${(i + 1) * 500}`);
            new Chart(document.getElementById('chart-rt'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { label: 'Control', data: rtBuckets(ctrlRT), backgroundColor: 'rgba(245,158,11,0.7)', borderRadius: 4 },
                        { label: 'AI Label', data: rtBuckets(aiRT), backgroundColor: 'rgba(239,68,68,0.7)', borderRadius: 4 },
                    ]
                },
                options: { responsive: true, scales: { x: { title: { display: true, text: 'RT (ms)' } }, y: { title: { display: true, text: 'Count' } } } }
            });
        }
    </script>
</body>

</html>
